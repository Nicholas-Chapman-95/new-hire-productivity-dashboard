appearance:
  default: light
  switcher: false

theme:
  colorPalettes:
    default:
      light:
        - "#1f5f8b"
        - "#2c7a7b"
        - "#ba6b57"
        - "#d39d68"
        - "#6f7d6d"
        - "#9a6f8f"
        - "#6e8fb3"
        - "#c46f4f"
        - "#97b2c4"
        - "#7aa39b"
      dark:
        - "#1f5f8b"
        - "#2c7a7b"
        - "#ba6b57"
        - "#d39d68"
        - "#6f7d6d"
        - "#9a6f8f"
        - "#6e8fb3"
        - "#c46f4f"
        - "#97b2c4"
        - "#7aa39b"
  colorScales:
    default:
      light:
        - "#ADD8E6"
        - "#00008B"
      dark:
        - "#ADD8E6"
        - "#00008B"
  colors:
    primary:
      light: "#1f5f8b"
      dark: "#6e8fb3"
    accent:
      light: "#ba6b57"
      dark: "#d39d68"
    base:
      light: "#ffffff"
      dark: "#101315"
    info:
      light: "#2c7a7b"
      dark: "#7aa39b"
    positive:
      light: "#4e7a5d"
      dark: "#89b194"
    warning:
      light: "#c48a3a"
      dark: "#d9b067"
    negative:
      light: "#a44f43"
      dark: "#cf7d70"

plugins:
  components:
    # This loads all of evidence's core charts and UI components
    # You probably don't want to edit this dependency unless you know what you are doing
    "@evidence-dev/core-components": {}

  datasources:
    # You can add additional datasources here by adding npm packages. 
    # Make to also add them to `package.json`.
    "@evidence-dev/bigquery": { }
    "@evidence-dev/csv": { }
    "@evidence-dev/databricks": { }
    "@evidence-dev/duckdb": { }
    "@evidence-dev/mssql": { }
    "@evidence-dev/mysql": { }
    "@evidence-dev/postgres": { }
    "@evidence-dev/source-javascript": { }
    "@evidence-dev/snowflake": { }
    "@evidence-dev/sqlite": { }
    "@evidence-dev/trino": { }
    "@evidence-dev/motherduck": { }

deployment:
  basePath: /reliability-case-study-dashboard
